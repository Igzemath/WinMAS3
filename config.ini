# ══════════════════════════════════════════════
# Windows 11 ISO Checker & Downloader
# Configuration
# ══════════════════════════════════════════════

[General]

# Méthode d'activation par défaut
# Valeurs possibles : HWID, Ohook, KMS38, KMS
#   HWID  = Activation permanente liée au matériel (recommandé)
#   Ohook = Active Microsoft Office (2013-2024)
#   KMS38 = Activation jusqu'au 19 janvier 2038
#   KMS   = Activation classique 180 jours (renouvellement auto)
activation_method = HWID

[ISO]

# Version par défaut (ex: 24H2, 23H2)
# Laisser vide pour sélectionner automatiquement la plus récente
default_version = 25H2

# Édition par défaut
# Valeurs possibles : Consumer, Business, Enterprise, Enterprise LTSC,
#   Education, IoT Enterprise, IoT Enterprise LTSC
# Les variantes ARM64 s'écrivent : Consumer (ARM64), Business (ARM64), etc.
default_edition = Consumer

# Langue par défaut (code langue)
# Exemples : fr-fr, en-us, en-gb, de-de, es-es, it-it, pt-br, ja-jp, zh-cn
# Liste complète : ar-sa, bg-bg, cs-cz, da-dk, de-de, el-gr, en-gb, en-us,
#   es-es, es-mx, et-ee, fi-fi, fr-ca, fr-fr, he-il, hr-hr, hu-hu, it-it,
#   ja-jp, ko-kr, lt-lt, lv-lv, nb-no, nl-nl, pl-pl, pt-br, pt-pt, ro-ro,
#   ru-ru, sk-sk, sl-si, sr-latn-rs, sv-se, th-th, tr-tr, uk-ua, zh-cn, zh-tw
default_language = fr-fr

